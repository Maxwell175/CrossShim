# cbindgen configuration for libafl_qemu_bridge

[defines]

[export]
include = []
exclude = []

[fn]
rename_args = "None"

[struct]
rename_fields = "None"

[enum]
rename_variants = "None"

[parse]
parse_deps = false
include = []
exclude = []
clean = false

[parse.expand]
crates = []
all_features = false
default_features = true
features = []

language = "C"
cpp_compat = true
header = """
