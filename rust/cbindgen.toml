include_version = true
namespace = ""
namespaces = []
using_namespaces = []
sys_includes = ["stdint.h", "stdbool.h", "stddef.h"]
includes = []
no_includes = false
after_includes = ""
documentation = true
documentation_style = "auto"
documentation_length = "full"

[export.rename]

[export.body]

[export.mangle]

[layout]
aligned_n = ""

[cython]
header = ""
