# Test cases compiled out by test/bionic/build.sh because they are not
# available through the current NDK/API/toolchain combination.
#
# Format: test_binary:test_case # reason

stdlib_test:stdlib.qsort_r # qsort_r not available in API 35
unistd_test:UNISTD_TEST._Fork # requires bionic internals
unistd_test:UNISTD_TEST.vfork # requires pthread_internal_t
pthread_test:pthread.big_enough_signal_stack # FrameCounter helpers not available in the NDK build
pthread_test:pthread.run_on_all_threads # android_run_on_all_threads not available
pthread_test:pthread.pthread_getaffinity_np_failure # pthread_*affinity_np not available
pthread_test:pthread.pthread_getaffinity # pthread_*affinity_np not available
pthread_test:pthread.pthread_setaffinity_np_failure # pthread_*affinity_np not available
pthread_test:pthread.pthread_setaffinity # pthread_*affinity_np not available
sched_test:sched.sched_getattr # sched_*attr requires API 37+
sched_test:sched.sched_setattr_failure # sched_*attr requires API 37+
semaphore_test:semaphore.sem_wait_no_EINTR_in_sdk_less_equal_than_23 # android_set_application_target_sdk_version not available
semaphore_test:semaphore.sem_wait_EINTR_in_sdk_greater_than_23 # android_set_application_target_sdk_version not available
signal_test:signal.sig2str # sig2str not available in the NDK
signal_test:signal.str2sig # str2sig not available in the NDK
sys_stat_test:sys_stat.lchmod # lchmod not available in bionic
