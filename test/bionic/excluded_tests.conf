# Tests excluded due to x86-64 vs ARM64 architectural differences
# These are not bugs in the emulator - they reflect genuine differences
# between host (x86-64 glibc) and guest (ARM64 bionic) math implementations.
#
# Format: test_binary:test_pattern
# test_pattern uses gtest filter syntax (wildcards with *)

# ===========================================================================
# Fork/Death Tests - QEMU usermode doesn't support fork semantics properly
# The child works but the parent hangs after clone syscall returns.
# ===========================================================================
atexit_test:atexit.exit
assert_test:assert_DeathTest.assert_false
fcntl_test:fcntl_DeathTest.*
pthread_test:pthread_DeathTest.*
pthread_test:pthread.pthread_key_fork
pthread_test:pthread.pthread_atfork_smoke_*
semaphore_test:semaphore_DeathTest.*
setjmp_test:setjmp_DeathTest.*
stdio_test:stdio_DeathTest.*
stdlib_test:stdlib_DeathTest.*
stdlib_test:stdlib.exit_torture
unistd_test:unistd_DeathTest.*
unistd_test:unistd.getpid_caching_and_vfork
unistd_test:unistd.getpid_caching_and_clone_process
unistd_test:unistd.gettid_caching_and_clone_process
unistd_test:unistd.gettid_caching_and_clone_process_settid

# ===========================================================================
# Tests requiring external test libraries - not built in our test infrastructure
# ===========================================================================
atexit_test:atexit.sofile

# ===========================================================================
# Intel precision tests - these check for exact ulp matches that differ
# between x86-64 and ARM64 floating-point implementations
# ===========================================================================
math_test:math_h.cbrt_intel
math_test:math_h.cos_intel
math_test:math_h.log10_intel
math_test:math_h.sin_intel
math_test:math_h.tan_intel
math_test:math_h.scalb_intel
math_test:math_h.scalbf_intel
math_test:math_h.remquo_intel
math_test:math_h.remquof_intel

# Rounding mode tests - these require the HLE to change host FPU rounding mode
# which is expensive and affects all host code. The guest rounding mode is
# properly tracked in FPCR but host math functions use host rounding.
math_test:math_h.lrint
math_test:math_h.rint
math_test:math_h.nearbyint

# Long double overflow tests - x86-64 80-bit extended precision has different
# overflow behavior than ARM64 128-bit binary128 for gamma functions
math_test:math_h.tgammal

# Current harness/ABI gaps that are known and explicitly unsupported
getauxval_test:getauxval.arm_has_AT_HWCAP2
libgen_test:libgen.basename_r
libgen_test:libgen.dirname_r
math_test:math_h.significandl
math_test:math_h.gamma
math_test:math_h.gammaf
pthread_test:pthread.pthread_mutex_pi_count_limit
pthread_test:pthread.pthread_mutex_owner_tid_limit
pthread_test:pthread.pthread_mutex_lock_null_32
pthread_test:pthread.pthread_mutex_unlock_null_32
sys_stat_test:sys_stat.mkfifo
